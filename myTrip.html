<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행 앨범</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>🌍 나의 여행 앨범 🪐</h1>

        <div class="audio-card">
            <audio controls>
                <source src="media/여행음악.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
            <strong class="audio-subtitle">여행 음악 🎵</strong>
        </div>
        
        <hr>
        
        <!-- 클래스명을 trip-grid로 간결화하고 내부 <br> 태그를 제거했습니다 -->
        <div class="trip-grid">
            <p class="trip-card">
                <img src="media/오사카성.jpg" alt="오사카성">
                <strong class="trip-title">오사카성</strong>
            </p>
            
            <p class="trip-card">
                <img src="media/에펠탑.jpg" alt="에펠탑">
                <strong class="trip-title">에펠탑</strong>
            </p>
            
            <p class="trip-card">
                <img src="media/경복궁.jpg" alt="경복궁">
                <strong class="trip-title">경복궁</strong>
            </p>
        </div>
        
        <hr>
        
        <h2>📹 나의 여행 브이로그</h2>
        <div class="vlog-card">
            <video width="100%" max-width="560" controls>
                <source src="media/여행비디오.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <br>
            <strong class="vlog-subtitle">아름다운 비행기 브이로그 ✈️</strong>
        </div>
    </div>
</body>
</html>
