<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행 앨범</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>🌍 나의 여행 앨범 🎵</h1>
        
        <audio controls>
            <source src="media/여행음악.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
        
        <hr>
        
        <div class="trip-grid-container">
            <p class="trip-card">
                <img src="media/오사카성.jpg" width="400" height="200" alt="오사카성"><br>
                <strong>오사카성 (2026년)</strong>
            </p>
            
            <p class="trip-card">
                <img src="media/에펠탑.jpg" width="400" height="200" alt="에펠탑"><br>
                <strong>에펠탑 (2026년)</strong>
            </p>
            
            <p class="trip-card">
                <img src="media/경복궁.jpg" width="400" height="200" alt="경복궁"><br>
                <strong>경복궁 (2026년)</strong>
            </p>
        </div>
        
        <hr>
        
        <h2>📹 나의 여행 브이로그</h2>
        <p>
            <!-- 비디오 재생기: media 폴더 안의 video.mp4 호출 -->
            <video width="400" height="225" controls>
                <source src="media/여행비디오.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <br>
            <span>아름다운 비행기 브이로그✈️</span>
        </p>
    </div>
</body>
</html>
