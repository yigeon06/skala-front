<!DOCTYPE html>
<html lang="ko"> <!-- 한글 문서 설정으로 수정 -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
</head>
<body>
    <h1>회원가입</h1>

    <p>SKALA-FRONT 회원가입을 환영합니다.</p>

    <hr>

    <form action="signUpResult.html" method="get">
        
        <!-- 1. 계정 정보 영역 -->
        <fieldset>
            <legend>계정 정보</legend>

            <p>
                <label for="userId">아이디: </label>
                <input type="text" id="userId" name="userId" minlength="4" maxlength="15" required placeholder="4~15자 영문/숫자">
                <small>(필수)</small>
            </p>

            <p>
                <label for="passWord">비밀번호: </label>
                <input type="password" id="passWord" name="passWord" minlength="8" maxlength="20" required placeholder="8자 이상 입력">
                <small>(필수)</small>
            </p>

            <p>
                <label for="email">이메일: </label>
                <input type="email" id="email" name="email" required placeholder="이메일 주소입력">
                @
                <select name="emailDomain" id="emailDomain">
                    <option value="direct">직접 입력</option>
                    <option value="naver.com">naver.com</option>
                    <option value="gmail.com">gmail.com</option>
                    <option value="daum.net">daum.net</option>
                    <option value="nate.com">nate.com</option>
                </select>
            </p>
        </fieldset>
    
        <!-- 2. 개인 프로필 영역 -->
        <fieldset>
            <legend>개인 프로필 정보</legend>

            <p>
                <label for="name">이름: </label>
                <input type="text" id="name" name="name" minlength="2" maxlength="10" required placeholder="2~10자 한글/영문">
            </p>

            <p>
                <label for="birthDate">생년월일: </label>
                <input type="date" id="birthDate" name="birthDate" required>
            </p>

            <p>
                <strong>성별:</strong>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">남성</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">여성</label>
                <input type="radio" id="none" name="gender" value="none" required>
                <label for="none">선택안함</label>
            </p>

            <p>
                <strong>관심 분야 (중복 선택 가능):</strong><br>
                <label><input type="checkbox" name="interest" value="frontend"> 웹 프론트엔드 (Vue.js/HTML)</label><br>
                <label><input type="checkbox" name="interest" value="uiux"> UI/UX 디자인 표준</label><br>
                <label><input type="checkbox" name="interest" value="backend"> 백엔드 & 데이터베이스</label><br>
                <label><input type="checkbox" name="interest" value="devops"> 클라우드 & 인프라</label>
            </p>

            <p>
                <label for="signupSource">가입 경로: </label>
                <select name="signupSource" id="signupSource">
                    <option value="search">검색</option>
                    <option value="sns">SNS</option>
                    <option value="friend">친구 추천</option>
                    <option value="other">기타</option>
                </select>
            </p>
        </fieldset>
    
        <!-- 3. 자기소개 영역 -->
        <fieldset>
            <legend>자기소개</legend>
            <p>
                <label for="introduction">나를 표현하는 한 줄 소개 또는 가입 인사:</label><br>
                <textarea name="introduction" id="introduction" rows="4" cols="50" placeholder="여기에 내용을 입력하세요. (최대 200자)"></textarea>
            </p>
        </fieldset>

        <!-- 4. 제출 버튼 영역 -->
        <hr>
        <div style="margin-top: 20px;">
            <button type="submit">동의하고 회원가입 🚀</button>
            <button type="reset">다시 작성 🔄</button>
        </div>
        
    </form>
</body>
</html>
